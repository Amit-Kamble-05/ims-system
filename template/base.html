<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}IMS{% endblock %}</title>

    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/cropperjs/dist/cropper.min.css">
    <link rel="stylesheet" href="{% static 'css/admin.css' %}">
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
    <link rel="stylesheet" href="{% static 'css/personal_details.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="sidebar">
        
        <!-- LOGO -->
        <div class="sidebar-logo">
            <img src="{% static 'img/logo.png' %}" alt="Institute Logo" class="logo-img">
            <div class="logo-text">
                <div class="logo-main">A & A</div>
                <div class="logo-sub">Tech Institute</div>
            </div>
        </div>

        <!-- MENU -->
        <a href="{% url 'admin_dashboard' %}"
        class="menu-item {% if request.path == '/admin/dashboard/' %}active{% endif %}">
            <i class="bi bi-grid"></i>
            <span>Dashboard</span>
        </a>

        <a href="{% url 'student_list' %}"
        class="menu-item {% if '/students/' in request.path %}active{% endif %}">
            <i class="bi bi-people"></i>
            <span>Students</span>
        </a>

        <a href="{% url 'enquiry_reports' %}"
        class="menu-item {% if '/enquiry/' in request.path %}active{% endif %}">
            <i class="bi bi-people"></i>
            <span>Enquiry</span>
        </a>

        <a href="#" class="menu-item">
            <i class="bi bi-person-badge"></i>
            <span>Faculty</span>
            <i class="bi bi-chevron-right ms-auto"></i>
        </a>

        <a href="#" class="menu-item">
            <i class="bi bi-file-earmark-text"></i>
            <span>Reports</span>
            <i class="bi bi-chevron-right ms-auto"></i>
        </a>

        <hr>

        <a href="{% url 'admin_logout' %}" class="menu-item logout">
            <i class="bi bi-box-arrow-right"></i>
            <span>Logout</span>
        </a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <h4 class="mb-3">{% block page_title %}{% endblock %}</h4>
        {% block content %}{% endblock %}
    </div>
</div>
<script src="https://unpkg.com/cropperjs/dist/cropper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
